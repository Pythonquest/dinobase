version: 2

models:
  - name: mart_geologic_time
    description: >
      Geologic time dimension: each row is one interval within a PBDB time scale, with Ma bounds and parent interval.
      Join to occurrences on interval_id where present. Duplicate interval_id values in raw PBDB loads are
      collapsed to one row (arbitrary choice among scales when duplicated).
    columns:
      - name: interval_id
        description: "Interval identifier (int:...)"
        tests:
          - unique
          - not_null
      - name: interval_name
        description: "Interval name (e.g. Jurassic)"
      - name: interval_type
        description: "Chronostratigraphic rank (period, stage, ...)"
      - name: parent_interval_id
        description: "Parent interval in the same scale"
      - name: timescale_id
        description: "Containing time scale (tsc:...)"
      - name: timescale_name
        description: "Human-readable scale name (e.g. ICS)"
      - name: timescale_scope
        description: "Geographic or thematic scope of the scale"
      - name: early_age_ma
        description: "Older age bound (Ma)"
      - name: latest_age_ma
        description: "Younger age bound (Ma)"
